{% extends 'htmls/main.html' %}

{% block login %}
<div id="reg">
<p>Регистрация</p>
<form method="post">
{% csrf_token %}
{% for f in form %}
    <p ><label class="form-label" for="{{ f.id_for_label }}">{{f.label}}: </label>{{ f }}</p>
    <div class="form-error">{{ f.errors }}</div>
    {% endfor %}
<button type="submit">Ок</button>
</form>
</div>
{% endblock %}
